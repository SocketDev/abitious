# abitious npm distribution workspace. The npm packages live under npm/* — NEVER
# packages/* (the fleet mono-detector flags packages/* as a monorepo; abitious stays
# repo.type "solo", mirroring how decmpfs uses napi/* + napi/decmpfs/npm/*).
#
#   npm/cli         → @abitious/cli (the main package: platform loader + `abi` bin)
#   npm/<triple>    → @abitious/<triple> (per-platform prebuilt stub + host producer)
packages:
  - npm/*
  - '.config/fleet/oxlint-plugin'
  - '.config/fleet/oxlint-plugin/fleet/*'
  - '.claude/hooks/fleet/*'
trustPolicy: no-downgrade
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@sdxgen/*'
  - '@socketoverride/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'
  - '@stuie/*'
  - '@ultrathink/*'
  - 'sdxgen'
  - 'sfw'
  - 'socket'
  - 'stuie'
  # published: 2026-07-16 | removable: 2026-07-23
  - 'magic-string@1.0.0'
  # published: 2026-07-16 | removable: 2026-07-23
  - 'portless@0.15.4'
  # oxlint-tsgolint 7.0.2001 — the type-aware lint sidecar the fleet lint
  # runner's whole-tree gate needs. The main package + its per-platform binary
  # family are pinned to the exact version (a scope glob would blanket-bypass a
  # future publish); exact-pinned so a future version re-soaks.
  # published: 2026-07-21 | removable: 2026-07-28
  - 'oxlint-tsgolint@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/darwin-arm64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/darwin-x64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/linux-arm64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/linux-x64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/win32-arm64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/win32-x64@7.0.2001'
blockExoticSubdeps: true
confirmModulesPurge: false
managePackageManagerVersions: false
pmOnFail: warn
# Link the workspace @abitious/<triple> packages for @abitious/cli's version-string
# optionalDependencies (pnpm 11 defaults this to false, which would resolve them from
# the registry — where they aren't published yet — so they'd be optional-skipped and the
# lockfile's npm/cli importer would be empty, failing `pnpm install --frozen-lockfile`).
# decmpfs sets this for the same @scope/<triple> pattern.
linkWorkspacePackages: true

allowBuilds:
  cpu-features: false
  protobufjs: false
  puppeteer: false
  ssh2: false
