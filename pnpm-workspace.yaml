# abitious npm distribution workspace. The npm packages live under npm/* — NEVER
# packages/* (the fleet mono-detector flags packages/* as a monorepo; abitious stays
# repo.type "solo", mirroring how decmpfs uses napi/* + napi/decmpfs/npm/*).
#
#   npm/cli         → @abitious/cli (the main package: platform loader + `abi` bin)
#   npm/<triple>    → @abitious/<triple> (per-platform prebuilt stub + host producer)
packages:
  - npm/*
# Link the workspace @abitious/<triple> packages for @abitious/cli's version-string
# optionalDependencies (pnpm 11 defaults this to false, which would resolve them from
# the registry — where they aren't published yet — so they'd be optional-skipped and the
# lockfile's npm/cli importer would be empty, failing `pnpm install --frozen-lockfile`).
# decmpfs sets this for the same @scope/<triple> pattern.
linkWorkspacePackages: true
