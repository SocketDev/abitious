# Fleet toolchain for repositories whose primary build is Rust. Keep the
# channel exact so local development and CI compile with the same compiler.
# rustfmt and clippy are declared here because the shared format/check commands
# depend on them; profile=minimal avoids unrelated documentation components.
[toolchain]
channel = "nightly-2026-07-12"
components = ["clippy", "rustfmt"]
profile = "minimal"
